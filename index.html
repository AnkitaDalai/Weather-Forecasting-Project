<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Weather Forecast App</title>

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    href="https://cdn-icons-png.flaticon.com/512/7133/7133364.png"
  >

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />

</head>

<body class="font-[Poppins] bg-gradient-to-r from-blue-100 to-slate-100 min-h-screen p-5">

  <!-- Main Container -->
  <div class="max-w-7xl mx-auto">

    <!-- =========================
         Header
    ========================== -->

    <header class="flex flex-wrap items-center justify-between gap-5 mb-5">

      <!-- Logo -->
      <div class="flex items-center gap-3">

        <i class="fa-solid fa-cloud-sun text-4xl text-blue-600"></i>

        <h1 class="text-3xl font-semibold text-slate-800">
          Weatherly
        </h1>

      </div>

      <!-- Search Box -->
      <div
        class="flex flex-1 max-w-xl bg-white rounded-full overflow-hidden shadow-md"
      >

        <input
          type="text"
          id="cityInput"
          placeholder="Search city..."
          class="flex-1 px-5 py-4 outline-none text-slate-700"
        >

        <button
          id="searchBtn"
          class="w-16 bg-blue-600 text-white hover:bg-blue-700 transition"
        >

          <i class="fa-solid fa-magnifying-glass"></i>

        </button>

      </div>

      <!-- Header Buttons -->
      <div class="flex items-center gap-4 flex-wrap">

        <!-- Current Location -->
        <button
          id="locationBtn"
          class="bg-white text-slate-700 px-5 py-3 rounded-full font-medium shadow hover:bg-blue-600 hover:text-white transition"
        >

          <i class="fa-solid fa-location-dot mr-2"></i>
          Current Location

        </button>

        <!-- Temperature Toggle -->
        <div class="flex bg-white rounded-full overflow-hidden shadow">

          <button
            id="celsiusBtn"
            class="px-5 py-3 font-semibold bg-blue-600 text-white"
          >
            °C
          </button>

          <button
            id="fahrenheitBtn"
            class="px-5 py-3 font-semibold text-slate-700"
          >
            °F
          </button>

        </div>

      </div>

    </header>

    <!-- =========================
         Recent Searches
    ========================== -->

    <div class="mb-5">

      <select
        id="recentCities"
        class="bg-white px-5 py-3 rounded-full shadow text-slate-700 outline-none"
      >

        <option value="">
          Recent Searches
        </option>

      </select>

    </div>

    <!-- =========================
         Weather Section
    ========================== -->

    <section
      class="weather-section relative rounded-[30px] overflow-hidden min-h-[500px] mb-6 bg-cover bg-center"
    >

      <!-- Overlay -->
      <div class="overlay absolute inset-0 bg-black/40"></div>

      <!-- Weather Content -->
      <div
        class="weather-content relative z-10 flex flex-wrap justify-between gap-8 p-10"
      >

        <!-- Weather Info -->
        <div class="weather-info text-white">

          <h1
            id="cityName"
            class="text-5xl font-semibold mb-3"
          >
            Bhubaneswar
          </h1>

          <p
            id="dateTime"
            class="mb-5 text-lg"
          >
            Saturday, 30 May 2026
          </p>

          <!-- Temperature -->
          <div class="flex items-center gap-5">

            <h2
              id="temperature"
              class="text-8xl font-bold"
            >
              28°C
            </h2>

            <img
              id="weatherIcon"
              src="https://openweathermap.org/img/wn/02d@2x.png"
              alt="Weather Icon"
              class="w-32"
            >

          </div>

          <h3
            id="weatherCondition"
            class="text-3xl font-medium mt-3"
          >
            Partly Cloudy
          </h3>

        </div>

        <!-- Weather Details -->
        <div
          class="weather-details grid grid-cols-1 sm:grid-cols-2 gap-5 w-full lg:w-auto"
        >

          <!-- Card -->
          <div
            class="detail-card bg-white/20 backdrop-blur-md p-6 rounded-2xl text-center text-white w-[180px]"
          >

            <i class="fa-solid fa-temperature-half text-3xl mb-3"></i>

            <p class="mb-2">
              Feels Like
            </p>

            <h4
              id="feelsLike"
              class="text-2xl font-semibold"
            >
              31°C
            </h4>

          </div>

          <!-- Card -->
          <div
            class="detail-card bg-white/20 backdrop-blur-md p-6 rounded-2xl text-center text-white w-[180px]"
          >

            <i class="fa-solid fa-droplet text-3xl mb-3"></i>

            <p class="mb-2">
              Humidity
            </p>

            <h4
              id="humidity"
              class="text-2xl font-semibold"
            >
              70%
            </h4>

          </div>

          <!-- Card -->
          <div
            class="detail-card bg-white/20 backdrop-blur-md p-6 rounded-2xl text-center text-white w-[180px]"
          >

            <i class="fa-solid fa-wind text-3xl mb-3"></i>

            <p class="mb-2">
              Wind
            </p>

            <h4
              id="windSpeed"
              class="text-2xl font-semibold"
            >
              12 km/h
            </h4>

          </div>

          <!-- Card -->
          <div
            class="detail-card bg-white/20 backdrop-blur-md p-6 rounded-2xl text-center text-white w-[180px]"
          >

            <i class="fa-solid fa-gauge-high text-3xl mb-3"></i>

            <p class="mb-2">
              Pressure
            </p>

            <h4
              id="pressure"
              class="text-2xl font-semibold"
            >
              1012 hPa
            </h4>

          </div>

        </div>

      </div>

    </section>

    <!-- =========================
         Weather Alert
    ========================== -->

    <div
      class="weather-alert flex items-center gap-4 bg-orange-100 text-orange-900 px-6 py-4 rounded-2xl mb-6"
      id="weatherAlert"
    >

      <i class="fa-solid fa-triangle-exclamation text-2xl"></i>

      <p class="font-medium">
        High temperature alert! Stay hydrated.
      </p>

      <button
        id="closeAlert"
        class="ml-auto text-xl"
      >

        <i class="fa-solid fa-xmark"></i>

      </button>

    </div>

    <!-- =========================
         Forecast Section
    ========================== -->

    <section class="forecast-section mb-8">

      <!-- Title -->
      <div class="mb-5">

        <h2 class="text-3xl font-semibold text-slate-800">
          5-Day Forecast
        </h2>

      </div>

      <!-- Forecast Cards -->
      <div
        id="forecastCards"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-5"
      >

        <!-- Forecast Card -->
        <div
          class="forecast-card bg-white rounded-3xl p-6 text-center shadow-md text-slate-700 hover:-translate-y-1 transition"
        >

          <h3 class="text-xl font-semibold mb-3">
            Sun
          </h3>

          <img
            src="https://openweathermap.org/img/wn/01d@2x.png"
            alt=""
            class="w-24 mx-auto"
          >

          <p class="my-2">
            Sunny
          </p>

          <h4 class="text-3xl font-bold text-blue-600">
            30°C
          </h4>

        </div>

      </div>

    </section>

    <!-- =========================
         Footer
    ========================== -->

    <footer class="text-center py-5 text-slate-700 font-medium">

      <p>
        Developed by Ankita Dalai © 2026
      </p>

    </footer>

  </div>

  <!-- =========================
       Loader
  ========================== -->

  <div
    id="loader"
    class="fixed inset-0 bg-white/90 hidden justify-center items-center z-50"
  >

    <div
      class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"
    ></div>

  </div>

  <!-- JS File -->
  <script src="script.js"></script>

</body>

</html>
